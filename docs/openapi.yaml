openapi: 3.0.3
info:
  title: toNotion API
  version: 0.2.0
  description: |
    API for ingesting WeChat article links, parsing content, and syncing to Notion.
servers:
  - url: /
    description: Current deployment
tags:
  - name: System
  - name: Console
  - name: Ingest
  - name: Item
  - name: Auth
  - name: Settings
  - name: Me
  - name: Admin
paths:
  /healthz:
    get:
      tags: [System]
      summary: Service health check
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthzResponse'

  /v1/console/login:
    post:
      tags: [Console]
      summary: Create console session cookie with API token
      operationId: consoleLogin
      description: |
        Accepts API token from `Authorization: Bearer <token>` header.
        Also supports JSON body `{ "token": "..." }` as fallback.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsoleLoginRequest'
      responses:
        '200':
          description: Console session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsoleLoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/console/logout:
    post:
      tags: [Console]
      summary: Clear console session cookie
      operationId: consoleLogout
      responses:
        '200':
          description: Console session cleared
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsoleLogoutResponse'

  /v1/console/refresh:
    post:
      tags: [Console]
      summary: Refresh console session cookie before expiry
      operationId: consoleRefresh
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Console session refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsoleRefreshResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/console/session:
    get:
      tags: [Console]
      summary: Get current console session profile
      operationId: consoleSession
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '200':
          description: Current console session profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsoleSessionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/ingest:
    post:
      tags: [Ingest]
      summary: Ingest WeChat article URL
      operationId: ingestItem
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestRequest'
      responses:
        '202':
          description: Accepted for async processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/items:
    get:
      tags: [Item]
      summary: List user items
      operationId: listItems
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/ItemStatus'
        - in: query
          name: page_size
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: page_token
          schema:
            type: string
      responses:
        '200':
          description: Item list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/items/{itemId}:
    get:
      tags: [Item]
      summary: Get item detail
      operationId: getItem
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ItemId'
      responses:
        '200':
          description: Item detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/items/{itemId}/retry:
    post:
      tags: [Item]
      summary: Retry parsing/syncing item
      operationId: retryItem
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ItemId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetryRequest'
      responses:
        '202':
          description: Retry accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/auth/notion/start:
    get:
      tags: [Auth]
      summary: Build Notion OAuth authorize URL
      operationId: notionAuthStart
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OAuth start payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthStartResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/auth/notion/callback:
    get:
      tags: [Auth]
      summary: Handle Notion OAuth callback
      operationId: notionAuthCallback
      parameters:
        - in: query
          name: code
          required: true
          schema:
            type: string
        - in: query
          name: state
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Callback handled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthCallbackResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /v1/auth/notion/refresh:
    post:
      tags: [Auth]
      summary: Refresh current user's Notion OAuth token
      operationId: notionAuthRefresh
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthRefreshResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/settings/notion-target:
    put:
      tags: [Settings]
      summary: Update current user's Notion target page (legacy endpoint)
      operationId: updateNotionTargetLegacy
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNotionTargetRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateNotionTargetResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/me:
    get:
      tags: [Me]
      summary: Get current user profile
      operationId: getMeProfile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeProfileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /v1/me/tokens:
    get:
      tags: [Me]
      summary: List current user's access tokens
      operationId: listMyTokens
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Token list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Me]
      summary: Create current user's access token
      operationId: createMyToken
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTokenRequest'
      responses:
        '201':
          description: Token created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /v1/me/tokens/{tokenId}/revoke:
    post:
      tags: [Me]
      summary: Revoke one of current user's tokens
      operationId: revokeMyToken
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TokenId'
      responses:
        '200':
          description: Token revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevokeTokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/me/notion-credentials:
    get:
      tags: [Me]
      summary: Get current user's Notion credential status
      operationId: getMyNotionCredential
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current credential status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeNotionCredentialGetResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags: [Me]
      summary: Upsert current user's Notion credential
      operationId: upsertMyNotionCredential
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeNotionCredentialPutRequest'
      responses:
        '200':
          description: Credential upserted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeNotionCredentialPutResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags: [Me]
      summary: Delete current user's Notion credential
      operationId: deleteMyNotionCredential
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Credential deletion result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeNotionCredentialDeleteResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/me/notion-connectivity-test:
    post:
      tags: [Me]
      summary: Test Notion credential and target page connectivity
      operationId: testMyNotionConnectivity
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeNotionConnectivityTestRequest'
      responses:
        '200':
          description: Notion connectivity test passed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeNotionConnectivityTestResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          description: Notion rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/me/notion-target:
    put:
      tags: [Me]
      summary: Update current user's Notion target page
      operationId: updateMyNotionTarget
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeNotionTargetRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeNotionTargetResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/admin/users:
    post:
      tags: [Admin]
      summary: Create user
      operationId: adminCreateUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminCreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCreateUserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags: [Admin]
      summary: List users
      operationId: adminListUsers
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [ACTIVE, DISABLED, DELETED]
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminListUsersResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /v1/admin/users/{userId}:
    patch:
      tags: [Admin]
      summary: Update user status or display name
      operationId: adminUpdateUser
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUpdateUserRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCreateUserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Admin]
      summary: Delete user (logical delete)
      operationId: adminDeleteUser
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: User deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDeleteUserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/admin/users/{userId}/tokens:
    get:
      tags: [Admin]
      summary: List access tokens for a specific user
      operationId: adminListUserTokens
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
        - in: query
          name: active
          schema:
            type: boolean
      responses:
        '200':
          description: User token list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserTokenListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Admin]
      summary: Create access token for a specific user
      operationId: adminCreateUserToken
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTokenRequest'
      responses:
        '201':
          description: User token created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCreateUserTokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/admin/users/{userId}/tokens/{tokenId}/revoke:
    post:
      tags: [Admin]
      summary: Revoke access token for a specific user
      operationId: adminRevokeUserToken
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
        - $ref: '#/components/parameters/TokenId'
      responses:
        '200':
          description: Token revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminRevokeUserTokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/admin/tokens:
    post:
      tags: [Admin]
      summary: Create API access token
      operationId: adminCreateToken
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/CreateTokenRequest'
                - type: object
                  properties:
                    user_id:
                      type: string
      responses:
        '201':
          description: Token created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    get:
      tags: [Admin]
      summary: List API access tokens
      operationId: adminListTokens
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: user_id
          schema:
            type: string
        - in: query
          name: active
          schema:
            type: boolean
      responses:
        '200':
          description: Token list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /v1/admin/tokens/{tokenId}/revoke:
    post:
      tags: [Admin]
      summary: Revoke API access token
      operationId: adminRevokeToken
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TokenId'
      responses:
        '200':
          description: Token revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevokeTokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/admin/audit-logs:
    get:
      tags: [Admin]
      summary: List audit logs
      operationId: adminListAuditLogs
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        - in: query
          name: page_token
          schema:
            type: string
          description: Offset-based pagination token returned by previous response.
        - in: query
          name: actor_user_id
          schema:
            type: string
        - in: query
          name: action
          schema:
            type: string
        - in: query
          name: target_type
          schema:
            type: string
        - in: query
          name: target_id
          schema:
            type: string
        - in: query
          name: from
          schema:
            type: string
          description: Filter logs with created_at >= from (ISO datetime).
        - in: query
          name: to
          schema:
            type: string
          description: Filter logs with created_at <= to (ISO datetime).
        - in: query
          name: format
          schema:
            type: string
            enum: [json, csv]
            default: json
      responses:
        '200':
          description: Audit log list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAuditLogListResponse'
            text/csv:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Bearer
    cookieAuth:
      type: apiKey
      in: cookie
      name: tonotion_console_session

  parameters:
    ItemId:
      in: path
      name: itemId
      required: true
      schema:
        type: string
    UserId:
      in: path
      name: userId
      required: true
      schema:
        type: string
    TokenId:
      in: path
      name: tokenId
      required: true
      schema:
        type: string

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid auth token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Permission denied
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    HealthzResponse:
      type: object
      properties:
        status:
          type: string
          example: ok

    ConsoleLoginRequest:
      type: object
      properties:
        token:
          type: string
          nullable: true
          description: Optional fallback when Authorization header is not provided.

    ConsoleLoginResponse:
      type: object
      properties:
        logged_in:
          type: boolean
        user_id:
          type: string
        is_admin:
          type: boolean
        expires_at:
          type: string
        user:
          allOf:
            - $ref: '#/components/schemas/AppUser'
          nullable: true

    ConsoleLogoutResponse:
      type: object
      properties:
        logged_out:
          type: boolean

    ConsoleRefreshResponse:
      type: object
      properties:
        refreshed:
          type: boolean
        expires_at:
          type: string

    ConsoleSessionResponse:
      allOf:
        - $ref: '#/components/schemas/MeProfileResponse'
        - type: object
          properties:
            session_expires_at:
              type: string
              nullable: true

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            trace_id:
              type: string
              nullable: true

    ItemStatus:
      type: string
      enum: [RECEIVED, PARSING, PARSE_FAILED, SYNCING, SYNC_FAILED, SYNCED]

    SyncError:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        retriable:
          type: boolean
        trace_id:
          type: string

    Item:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        client_item_id:
          type: string
        source_url:
          type: string
        normalized_url:
          type: string
        source_type:
          type: string
          enum: [wechat_mp]
