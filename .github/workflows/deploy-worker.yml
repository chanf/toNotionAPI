name: Deploy Worker

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "migrations/**"
      - "scripts/**"
      - "wrangler.toml"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

concurrency:
  group: deploy-worker-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Deploy Worker
        run: npm run deploy -- --name tonotionapi --keep-vars
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
