name = "tonotionapi"
main = "src/index.ts"
compatibility_date = "2026-02-20"
workers_dev = true

[vars]
WX2NOTION_DEV_TOKEN = "dev-token"
NOTION_MOCK = "false"
NOTION_API_VERSION = "2025-09-03"
NOTION_API_BASE_URL = "https://api.notion.com/v1"
NOTION_OAUTH_CLIENT_ID = "30dd872b-594c-8107-b2a6-0037877c4974"
NOTION_OAUTH_REDIRECT_URI = "https://tonotion.iiioiii.xin/v1/auth/notion/callback"
LOG_LEVEL = "info"

# Secrets must be configured via Wrangler/Dashboard, not in wrangler.toml:
# npx wrangler secret put NOTION_OAUTH_CLIENT_SECRET --name tonotionapi
# npx wrangler secret put CREDENTIALS_ENCRYPTION_KEY --name tonotionapi
# npx wrangler secret put CONSOLE_SESSION_SECRET --name tonotionapi

[[d1_databases]]
binding = "DB"
database_name = "wx2notion-db"
database_id = "21118507-6383-40c5-9c14-112c3c57536a"
preview_database_id = "21118507-6383-40c5-9c14-112c3c57536a"
migrations_dir = "migrations"
